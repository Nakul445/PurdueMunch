<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purdue Munch</title>
    <link rel="stylesheet" href="mainPage.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <style>
        /* Make entire tile clickable */
        a.tile {
            text-decoration: none;
            color: white;
        }
        a.tile h1 {
            margin: 0;
        }
    </style>
</head>
<body>
<div class="header-container">
    <header class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom">
        <div class="col-md-3 mb-2 mb-md-0">
            <a href="/" class="d-inline-flex link-body-emphasis text-decoration-none">
                <svg class="bi" width="40" height="32" role="img" aria-label="Bootstrap"><use xlink:href="#bootstrap"></use></svg>
            </a>
        </div>

        <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0">
            <li><a href="index.html" class="nav-link px-2 link-secondary">Purdue Munch</a></li>
            <li><a href="mainPage.html" class="nav-link px-2">Dining Courts</a></li>
            <li><a href="onthego.html" class="nav-link px-2">On-the-go</a></li>
            <li><a href="donation.html" class="nav-link px-2">Donate Your Meal Swipes</a></li>
        </ul>

        <div class="col-md-3 text-end">
            <button type="button" class="btn btn-outline-primary me-2" id="loginBtn">Login</button>
        </div>
    </header>
</div>

<div class="tiles">
    <a href="windsor.html" class="windsor gold tile">
        <h1>Windsor</h1>
    </a>

    <a href="wiley.html" class="wiley black tile">
        <h1>Wiley</h1>
    </a>

    <a href="earhart.html" class="earhart black tile">
        <h1>Earhart</h1>
    </a>

    <a href="hillenbrand.html" class="hillenbrand gold tile">
        <h1>Hillenbrand</h1>
    </a>

    <div class="ford-container">
        <a href="ford.html" class="ford gold tile">
            <h1>Ford</h1>
        </a>
    </div>
</div>

<script>
    const loginBtn = document.getElementById('loginBtn');
    if (loginBtn) {
        const isLoggedIn = localStorage.getItem('isLoggedIn');

        if (isLoggedIn === 'true') {
            loginBtn.textContent = 'Logout';
        }

        loginBtn.addEventListener('click', function () {
            const buttonText = this.textContent.trim();
            if (buttonText === 'Login') {
                window.location.href = 'login.html';
            } else {
                localStorage.setItem('isLoggedIn', 'false');
                loginBtn.textContent = 'Login';
                alert('You have successfully logged out!');
            }
        });
    }
</script>
</body>
</html>
